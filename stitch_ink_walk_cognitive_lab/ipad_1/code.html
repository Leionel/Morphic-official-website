<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ink Flow Notes - Bookshelf</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700;900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>.material-symbols-outlined {
    font-family: "Material Symbols Outlined";
    font-weight: normal;
    font-style: normal;
    font-size: 24px;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-feature-settings: "liga";
    -webkit-font-smoothing: antialiased
    }
body {
    font-family: "Noto Serif SC", serif;
    background-color: #dfd3bc;
    /* Silk/Parchment fallback */
    position: relative
    }
/* Subtle Rice Paper Texture Overlay */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 50;
    mix-blend-mode: multiply
    }
/* Landscape Integration */
.landscape-bg {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60vh;
    background-image: url(https://lh3.googleusercontent.com/aida/ADBb0uhAALkgPi3GmEIXS4Q4efmBw61IgZqOq3Fq6W52qG_qNxGkEHz55dF8VP93VQQhK5y22EZcDEjpG-0XdgcWguqfsYAO5obv2LgqZOwE-LP0JlGNnTu_-z4A8AEqhl_4L2ZoTKbwAcKUWdcG3sx9NYAIuk7p8VHm9uAjVIa1BCwuWhezn0EQYNQenA_6sBFNskgTDuw_Hh1Gs1X-8f0Q7apIGIW7mFUJ85z30xD1F1Jv9sPmzj2VjfPhh-VV0VCf_j27E47OAZMCxDk);
    background-size: cover;
    background-position: center bottom;
    background-repeat: no-repeat;
    opacity: 0.3;
    mix-blend-mode: multiply;
    mask-image: linear-gradient(to top, black 20%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, black 20%, transparent 100%);
    z-index: 0;
    pointer-events: none
    }
.scroll-border {
    border-left: 4px solid transparent;
    border-image: linear-gradient(to bottom, var(--tw-colors-primary-fixed-dim), var(--tw-colors-primary)) 1
    }</style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#dfd3bc",
                        "sidebar-light": "#d1c2a3",
                        "ink": "#3a332c",
                        "ink-light": "#5c534a",
                        "cinnabar": "#a83a2d",
                        "indigo": "#2b6a9a",
                        "azure": "#4fa18c",
                        "paper": "#ebe1cc",
                        "on-surface": "#3a332c"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif SC", "serif"],
                        "body": ["Noto Serif SC", "serif"],
                        "label": ["Noto Serif SC", "serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-ink h-screen overflow-hidden flex font-body antialiased selection:bg-indigo/30 selection:text-ink relative">
<!-- Landscape Background -->
<div class="landscape-bg"></div>
<!-- Narrow Sidebar -->
<aside class="flex flex-col items-center h-full py-6 bg-sidebar-light/80 backdrop-blur-sm border-r border-ink/10 text-ink-light w-20 md:w-24 shrink-0 z-10 transition-colors duration-500 overflow-y-auto shadow-[4px_0_12px_rgba(0,0,0,0.02)]">
<div class="mb-10 w-full flex justify-center">
<button class="text-ink hover:text-cinnabar transition-colors">
<span class="material-symbols-outlined text-3xl md:text-4xl">menu</span>
</button>
</div>
<nav class="flex-1 flex flex-col items-center gap-6 w-full">
<!-- Active Tab (Stamp Style) -->
<button class="w-12 h-12 md:w-14 md:h-14 rounded-md border-2 border-cinnabar text-cinnabar flex items-center justify-center transition-all bg-transparent shadow-sm">
<span class="material-symbols-outlined text-3xl md:text-4xl" style="font-variation-settings: 'FILL' 1;">view_list</span>
</button>
<!-- Inactive Tabs (Ink Sketch Style) -->
<button class="w-12 h-12 md:w-14 md:h-14 rounded-md hover:bg-ink/5 hover:text-cinnabar flex items-center justify-center transition-all text-ink/80">
<span class="material-symbols-outlined text-3xl md:text-4xl" style="font-variation-settings: 'FILL' 0;">book</span>
</button>
<button class="w-12 h-12 md:w-14 md:h-14 rounded-md hover:bg-ink/5 hover:text-cinnabar flex items-center justify-center transition-all text-ink/80">
<span class="material-symbols-outlined text-3xl md:text-4xl" style="font-variation-settings: 'FILL' 0;">star</span>
</button>
<button class="w-12 h-12 md:w-14 md:h-14 rounded-md hover:bg-ink/5 hover:text-cinnabar flex items-center justify-center transition-all text-ink/80">
<span class="material-symbols-outlined text-3xl md:text-4xl" style="font-variation-settings: 'FILL' 0;">delete</span>
</button>
<button class="w-12 h-12 md:w-14 md:h-14 rounded-md hover:bg-ink/5 hover:text-cinnabar flex items-center justify-center transition-all text-ink/80">
<span class="material-symbols-outlined text-3xl md:text-4xl" style="font-variation-settings: 'FILL' 0;">content_copy</span>
</button>
<button class="w-12 h-12 md:w-14 md:h-14 rounded-md hover:bg-ink/5 hover:text-cinnabar flex items-center justify-center transition-all text-ink/80">
<span class="material-symbols-outlined text-3xl md:text-4xl" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
<button class="w-12 h-12 md:w-14 md:h-14 rounded-md hover:bg-ink/5 hover:text-cinnabar flex items-center justify-center transition-all text-ink/80">
<span class="material-symbols-outlined text-3xl md:text-4xl" style="font-variation-settings: 'FILL' 0;">error</span>
</button>
</nav>
<div class="mt-auto pt-6">
<button class="w-10 h-10 md:w-12 md:h-12 rounded-full border border-ink/20 hover:bg-ink/5 flex items-center justify-center transition-all text-ink">
<span class="material-symbols-outlined text-xl md:text-2xl">chevron_right</span>
</button>
</div>
</aside>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col relative h-full overflow-hidden z-10">
<!-- Top Bar -->
<header class="w-full z-50 flex justify-between items-center px-6 md:px-10 py-4 md:py-6 bg-transparent text-ink font-serif">
<div class="flex items-center">
<div class="px-3 py-1 md:px-4 md:py-1.5 rounded-sm border-2 border-cinnabar bg-transparent">
<h1 class="text-lg md:text-xl font-bold text-cinnabar tracking-widest" style="writing-mode: horizontal-tb;">所有笔记</h1>
</div>
</div>
<!-- Trailing Icons -->
<div class="flex items-center gap-5 md:gap-6 text-ink-light">
<button class="hover:text-indigo transition-colors">
<span class="material-symbols-outlined text-2xl md:text-3xl">cloud_queue</span>
</button>
<button class="hover:text-indigo transition-colors">
<span class="material-symbols-outlined text-2xl md:text-3xl">format_list_bulleted</span>
</button>
<button class="hover:text-indigo transition-colors">
<span class="material-symbols-outlined text-2xl md:text-3xl">search</span>
</button>
<button class="hover:text-indigo transition-colors">
<span class="material-symbols-outlined text-2xl md:text-3xl">check_circle</span>
</button>
</div>
</header>
<!-- Canvas (Scrolls Grid) -->
<div class="flex-1 overflow-y-auto px-6 md:px-10 pb-32 scroll-smooth">
<div class="max-w-6xl mx-auto pt-4 md:pt-6">
<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-x-6 gap-y-10 md:gap-x-8 md:gap-y-12">
<!-- Note Card 1 -->

</div>

<div class="flex items-center justify-between w-full mb-1">
<span class="w-6 md:w-8"></span> <!-- Spacer for center alignment -->

<span class="material-symbols-outlined text-xl md:text-2xl">more_vert</span>

<span class="material-symbols-outlined text-3xl md:text-4xl group-hover:scale-110 transition-transform">add</span>
</button>
</main>
</body></html>
