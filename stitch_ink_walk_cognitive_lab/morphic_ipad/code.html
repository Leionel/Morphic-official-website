<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>系统登录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  }
</style>
<script id="tailwind-config">

    theme: {
      extend: {
        "colors": {
                "on-primary": "#f7f9ff",

                "surface-dim": "#c4dcff",
                "inverse-surface": "#020f1f",
                "primary-fixed-dim": "#7bb7ff",
                "on-error": "#fff7f6",
                "surface-container": "#e5eeff",
                "primary-dim": "#005595",
                "on-tertiary-fixed": "#004e26",
                "surface-variant": "#d3e4ff",
                "on-secondary": "#e7ffec",
                "outline-variant": "#98b4db",
                "secondary-fixed": "#d2fbdd",
                "on-surface": "#153454",
                "inverse-primary": "#72aef8",
                "secondary-container": "#d2fbdd",
                "primary": "#1361a5",
                "on-tertiary-container": "#006332",
                "on-background": "#153454",
                "error": "#ac3434",
                "surface-tint": "#1361a5",
                "on-tertiary": "#e8ffe9",
                "on-surface-variant": "#456184",
                "surface-container-low": "#eff4ff",
                "primary-fixed": "#97c4ff",
                "surface-bright": "#f8f9ff",
                "tertiary-fixed-dim": "#92eeab",
                "surface-container-highest": "#d3e4ff",
                "surface-container-high": "#dce9ff",
                "error-container": "#f56965",
                "surface-container-lowest": "#ffffff",
                "secondary-dim": "#375b45",

                "on-primary-container": "#003e6f",

        "fontFamily": {
                "headline": [
                        "Noto Serif SC", "Noto Serif", "serif"
                ],
                "body": [
                        "Noto Serif SC", "Noto Serif", "serif"
                ]
        }
},
    },
  }
</script>
</head>
<body class="bg-[#d4c19a] text-on-surface antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
<div class="grain-overlay"></div>
<!-- Background Image - Landscape Style -->
<div class="absolute inset-0 z-0 bg-[#cdd5d1]">
<img alt="千里江山背景" class="w-full h-full object-cover opacity-85 mix-blend-multiply" src="https://lh3.googleusercontent.com/aida/ADBb0uhAALkgPi3GmEIXS4Q4efmBw61IgZqOq3Fq6W52qG_qNxGkEHz55dF8VP93VQQhK5y22EZcDEjpG-0XdgcWguqfsYAO5obv2LgqZOwE-LP0JlGNnTu_-z4A8AEqhl_4L2ZoTKbwAcKUWdcG3sx9NYAIuk7p8VHm9uAjVIa1BCwuWhezn0EQYNQenA_6sBFNskgTDuw_Hh1Gs1X-8f0Q7apIGIW7mFUJ85z30xD1F1Jv9sPmzj2VjfPhh-VV0VCf_j27E47OAZMCxDk"/>
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#d4c19a]/10 to-[#1A4571]/20"></div>
</div>
<!-- Login Card (Semi-transparent Rice Paper Texture) -->
<main class="relative z-10 w-full max-w-[500px] mx-4 md:mx-auto">
<!-- Ambient Shadow / Soft Glow -->
<div class="relative bg-[#f5f1e7]/85 backdrop-blur-md rounded-xl p-10 md:p-14 shadow-[0_8px_32px_rgba(26,69,113,0.15)]">
<!-- Header Area -->
<header class="text-center mb-10 flex flex-col items-center">
<!-- Brand Logo -->
<img alt="品牌标志" class="w-24 h-24 mb-4 rounded-3xl shadow-[0_4px_12px_rgba(0,0,0,0.1)] object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0ujZnwQ-pRmCOYTEJkzlBoe19oPI_HhSDN36VeKVwdp8Ui9iLcb-A2eHaWrssN7EjYdxBhOI0z5SifBWgnioWNcmCOyMJU7KdAYTO0yh5ibZnPmJOnghZ0wNpr7BCzxIhv9waAvn5lBOyagr4oRu1XqDEwdWw1T2aizs60SPHEdzJK9_yPOaPVP-fWod-3VRx2n3CX4aLW5FmsiE_fOquLNysH_vF2SMVO8O602usHdh0d-JN4VOUubZjzYFp8V2d5X0ojyTCVPndw"/>
<h1 class="text-[#1A4571] font-headline font-black text-3xl tracking-[0.2em] mb-1">欢迎登录</h1>
</header>
<!-- Form Area -->
<form class="space-y-8 flex flex-col">
<!-- Username/Email Input -->
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant/50 group-focus-within:text-[#1A4571] transition-colors" data-icon="person">person</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 px-10 py-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 focus:border-[#1A4571] focus:border-b-2 transition-all duration-300 font-body text-lg outline-none" placeholder="用户名 / 邮箱" type="text"/>
</div>
<!-- Password Input -->
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant/50 group-focus-within:text-[#1A4571] transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 px-10 py-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 focus:border-[#1A4571] focus:border-b-2 transition-all duration-300 font-body text-lg outline-none" placeholder="密码" type="password"/>
</div>
<!-- Utility Links -->
<div class="flex justify-between items-center text-sm font-body pt-2">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="rounded-sm border-outline-variant/50 text-[#1A4571] focus:ring-[#1A4571]/20 bg-transparent w-4 h-4 checked:bg-[#1A4571] transition-colors" type="checkbox"/>
<span class="text-on-surface-variant group-hover:text-on-surface transition-colors">记住我</span>
</label>
<a class="text-on-surface-variant hover:text-[#1A4571] transition-colors" href="#">忘记密码？</a>
</div>
<!-- Login Button (Azure/Cyan Gradient Style) -->
<div class="pt-6">
<button class="w-full py-4 bg-gradient-to-r from-[#1A4571] to-[#2b5d8c] hover:from-[#13375A] hover:to-[#1A4571] text-white font-headline font-bold text-xl tracking-[0.5em] rounded-sm transition-all duration-300 ease-in-out shadow-[0_4px_12px_rgba(26,69,113,0.3)] hover:shadow-[0_6px_16px_rgba(26,69,113,0.4)]" type="button">
            登录
          </button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-12 text-center border-t border-outline-variant/20 pt-6">
<p class="text-on-surface-variant font-body text-sm">
          还未拥有账号？ 
          <a class="text-[#1A4571] hover:text-[#13375A] font-semibold ml-1 transition-colors relative after:content-[''] after:absolute after:w-full after:scale-x-0 after:h-[1px] after:bottom-0 after:left-0 after:bg-[#13375A] hover:after:scale-x-100 after:transition-transform after:duration-300" href="#">
            立即注册
          </a>
</p>
</div>
</div>
</main>
</body></html>
